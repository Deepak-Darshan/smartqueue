version: "3.9"

services:
  producer:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: python worker/main.py
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      producer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  scaler:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: python scaler/main.py
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      producer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
